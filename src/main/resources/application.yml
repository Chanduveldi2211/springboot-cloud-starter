spring:
  application:
    name: springboot-cloud-starter
  cloud:
    config:
      enabled: false
    discovery:
      enabled: true

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}

logging:
  level:
    com.pcveldi: INFO
